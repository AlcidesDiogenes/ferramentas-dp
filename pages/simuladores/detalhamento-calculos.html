<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entenda seus Descontos - Ferramentas DP</title>

    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/forms.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script>if (localStorage.getItem("menuRetraido") === "true") document.documentElement.classList.add("menu-fechado");</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.min.js"></script>
</head>

<body class="preload">

    <div id="sidebar-placeholder"></div>

    <main class="main-content">
        <div class="main-header">
            <h1>Entenda seus Descontos</h1>
            <p class="subtitle">Simulador didático para cálculos de INSS e IRRF.</p>
        </div>

        <section class="module-card">
            <form id="form-calculo" class="simulator-form">
                <div class="form-grid">

                    <div class="form-section">
                        <h3>Configurações da Simulação</h3>

                        <div class="form-group">
                            <label for="tipo-calculo" class="form-label">O que você deseja calcular?</label>
                            <select id="tipo-calculo" class="form-control">
                                <option value="ambos">INSS e IRRF (Ambos)</option>
                                <option value="inss">Somente INSS</option>
                                <option value="irrf">Somente IRRF</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="tipo-contribuinte" class="form-label">Tipo de Contribuinte</label>
                            <select id="tipo-contribuinte" class="form-control">
                                <option value="clt">Funcionário (CLT)</option>
                                <option value="prolabore">Sócio (Pró-labore)</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>Dados do Colaborador/Sócio</h3>

                        <div class="form-group">
                            <label for="salario-bruto" class="form-label">Salário Bruto (R$)</label>
                            <input type="number" id="salario-bruto" class="form-control" placeholder="0,00" step="0.01"
                                required>
                        </div>

                        <div class="form-group">
                            <label for="dependentes" class="form-label">Qtd. de Dependentes</label>
                            <input type="number" id="dependentes" class="form-control" placeholder="0" min="0">
                        </div>

                        <div class="form-group">
                            <label for="outras-bases" class="form-label">Outras Bases INSS (R$)</label>
                            <input type="number" id="outras-bases" class="form-control" placeholder="0,00" step="0.01">
                        </div>

                        <div class="form-group" id="wrapper-inss-contribuido" style="display: none;">
                            <label for="inss-contribuido" class="form-label">INSS Já Contribuído (R$)</label>
                            <input type="number" id="inss-contribuido" class="form-control" placeholder="0,00"
                                step="0.01">
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-action">Explicar Cálculo</button>
            </form>
        </section>

        <section class="module-card" id="secao-explicacao" style="display: none;">
            <h3>Como funciona o seu cálculo:</h3>
            <div id="explicacao-conteudo" class="calc-explanation">
            </div>

            <div class="actions-bar" style="margin-top: 20px; justify-content: center;">
                <button id="btn-export-pdf-detalhado" class="btn-action btn-pdf">
                    Baixar Relatório Completo (PDF)
                </button>
            </div>
        </section>
    </main>

    <script src="../../js/loader.js" defer></script>
    <script type="module" src="../../js/simuladores/detalhamento-calculos.js" defer></script>
</body>

</html>
