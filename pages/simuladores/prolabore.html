<!DOCTYPE html>
<html lang="pt-BR">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Pró-labore - Ferramentas DP</title>

    <link rel="stylesheet" href="../../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.min.js"></script>
    
    <script>if (localStorage.getItem("menuRetraido") === "true") document.documentElement.classList.add("menu-fechado");</script>
</head>


<body class="preload">

    <div id="sidebar-placeholder"></div>

    <main class="main-content">
        <header class="main-header">
            <h1>Simulador de Pró-labore</h1>
            <p class="subtitle">Gestão de custos e tributação para sócios.</p>
        </header>

        <section class="module-card">
            <form id="form-prolabore" class="simulator-form">
                
                <div class="form-grid">
                    <div class="form-section">
                        <h3>Informações da Empresa</h3>
                        
                        <div class="form-group">
                            <label for="regime" class="form-label">Regime Tributário</label>
                            <select id="regime" name="regime" class="form-control">
                                <option value="simples">Simples Nacional</option>
                                <option value="lucro">Lucro Presumido/Real</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="periodicidade" class="form-label">Periodicidade do Custo</label>
                            <select id="periodicidade" name="periodicidade" class="form-control">
                                <option value="1">Mensal</option>
                                <option value="6">Semestral</option>
                                <option value="12">Anual</option>
                            </select>
                        </div>

                        <div id="div-inss-patronal" class="form-group" style="display: none;">
                            <label for="inssPatronal" class="form-label">% INSS Patronal</label>
                            <input type="number" id="inssPatronal" name="inssPatronal" class="form-control" value="20" step="0.1">
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>Informações do Contribuinte</h3>
                        
                        <div class="form-group">
                            <label for="salario" class="form-label">Salário (Pró-labore)</label>
                            <input type="number" step="0.01" id="salario" name="salario" class="form-control" placeholder="0,00" required>
                        </div>

                        <div class="form-group">
                            <label for="filhos" class="form-label">Filhos (Qtd para abate IRRF)</label>
                            <input type="number" id="filhos" name="filhos" class="form-control" value="0" min="0">
                        </div>

                        <div class="form-group">
                            <label for="descontarInss" class="form-label">Descontar INSS</label>
                            <select id="descontarInss" name="descontarInss" class="form-control">
                                <option value="sim">Sim</option>
                                <option value="nao">Não</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="outrasBases" class="form-label">Outras bases INSS (Ganho externo)</label>
                            <input type="number" step="0.01" id="outrasBases" name="outrasBases" class="form-control" placeholder="0,00" min="0">
                        </div>

                        <div id="div-valor-contribuido" class="form-group" style="display: none;">
                            <label for="valorContribuido" class="form-label">Valor já contribuído de INSS</label>
                            <input type="number" step="0.01" id="valorContribuido" name="valorContribuido" class="form-control" placeholder="0,00" min="0">
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-action">Simular Cálculo</button>
            </form>
        </section>

        <section id="resultado-section" style="display: none;">
            <div id="resultado-calculo"></div>
        </section>
    </main>

    <script src="../../js/loader.js" defer></script>
    <script type="module" src="../../js/simuladores/prolabore.js" defer></script>
</body>
</html>
